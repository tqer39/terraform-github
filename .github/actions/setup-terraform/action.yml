name: Setup terraform

description: Setup Terraform

inputs:
  working-directory:
    description: Terraform CLI 実行時のパス
    required: true

runs:
  using: composite
  steps:
    - name: Get current Terraform version
      run: echo "TERRAFORM_VERSION=$(grep '^terraform' mise.toml | awk -F'\"' '{print $2}')" >> $GITHUB_ENV
      shell: bash

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Format
      run: terraform fmt -check -recursive -diff
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Terraform Init
      run: terraform init -upgrade
      working-directory: ${{ inputs.working-directory }}
      shell: bash
